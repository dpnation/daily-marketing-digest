name: Daily Marketing Digest

on:
  schedule:
    # Runs at 12:00 UTC = 8:00 AM ET every day
    - cron: "0 12 * * *"
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        run: python generate_digest.py

      - name: Commit and push updated digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if index.html actually changed
          git diff --cached --quiet || git commit -m "Daily digest: $(date +'%Y-%m-%d')"
          git push
